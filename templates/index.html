<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SmartTutor – CSIT5900</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<style>
  /* ---------- Reset & Variables ---------- */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #f9fafb;
    --surface:   #ffffff;
    --border:    #e5e7eb;
    --text:      #111827;
    --text-sec:  #6b7280;
    --primary:   #2563eb;
    --primary-h: #1d4ed8;
    --user-bg:   #eff6ff;
    --bot-bg:    #ffffff;
    --radius:    12px;
    --shadow:    0 1px 3px rgba(0,0,0,.08);
    --max-w:     820px;
  }

  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    overflow: hidden;
  }

  body {
    min-height: 100vh;
    min-height: 100dvh;
  }

  /* ---------- Layout ---------- */
  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    max-width: var(--max-w);
    margin: 0 auto;
    background: var(--surface);
    overflow: hidden;
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
  }

  /* --- Header --- */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 10;
    backdrop-filter: saturate(140%) blur(6px);
  }
  .header h1 {
    font-size: 17px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .header h1 .icon { font-size: 22px; }
  .header .clear-btn {
    font-size: 13px;
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    color: var(--text-sec);
    cursor: pointer;
    transition: all .15s;
  }
  .header .clear-btn:hover { background: #f3f4f6; color: var(--text); }

  /* --- Chat area --- */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    overscroll-behavior: contain;
    -webkit-overflow-scrolling: touch;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  /* Welcome screen */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 24px;
    text-align: center;
  }
  .welcome-icon { font-size: 48px; }
  .welcome h2 { font-size: 22px; font-weight: 600; }
  .welcome p  { color: var(--text-sec); font-size: 14px; max-width: 420px; }

  /* Demo buttons grid */
  .demo-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    max-width: 600px;
  }
  .demo-btn {
    font-size: 13px;
    padding: 8px 16px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    transition: all .15s;
    max-width: 280px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .demo-btn:hover { border-color: var(--primary); color: var(--primary); background: #eff6ff; }
  .demo-btn.reject { border-color: #fca5a5; color: #dc2626; }
  .demo-btn.reject:hover { background: #fef2f2; border-color: #dc2626; }

  /* --- Messages --- */
  .msg-row {
    display: flex;
    gap: 12px;
    max-width: 100%;
    animation: fadeIn .25s ease;
  }
  .msg-row.user { justify-content: flex-end; }
  .msg-row.bot  { justify-content: flex-start; }

  .msg-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
  }
  .msg-row.user .msg-avatar { background: var(--primary); color: #fff; }
  .msg-row.bot  .msg-avatar { background: #e5e7eb; color: var(--text); }

  .msg-bubble {
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 14.5px;
    line-height: 1.65;
    max-width: 75%;
    word-wrap: break-word;
    white-space: pre-wrap;
    box-shadow: var(--shadow);
  }
  .msg-row.user .msg-bubble { background: var(--primary); color: #fff; border-bottom-right-radius: 4px; }
  .msg-row.bot  .msg-bubble { background: var(--bot-bg); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

  .msg-bubble p { margin: 0 0 8px; }
  .msg-bubble p:last-child { margin-bottom: 0; }
  .msg-bubble ul, .msg-bubble ol { margin: 6px 0 8px 20px; }
  .msg-bubble li { margin: 2px 0; }
  .msg-bubble code {
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    font-size: 0.92em;
    padding: 1px 5px;
    border-radius: 6px;
    background: #f3f4f6;
  }
  .msg-bubble pre {
    margin: 8px 0;
    padding: 10px 12px;
    border-radius: 8px;
    background: #f3f4f6;
    overflow-x: auto;
  }
  .msg-bubble pre code { padding: 0; background: transparent; }
  .msg-bubble blockquote {
    margin: 8px 0;
    padding-left: 10px;
    border-left: 3px solid var(--border);
    color: var(--text-sec);
  }
  .msg-bubble .katex-display { margin: 10px 0; overflow-x: auto; overflow-y: hidden; }
  .msg-row.user .msg-bubble code,
  .msg-row.user .msg-bubble pre {
    background: rgba(255, 255, 255, .18);
    color: #fff;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  /* Typing indicator */
  .typing-dots { display: inline-flex; gap: 4px; padding: 4px 0; }
  .typing-dots span {
    width: 7px; height: 7px;
    background: var(--text-sec);
    border-radius: 50%;
    animation: bounce .6s infinite alternate;
  }
  .typing-dots span:nth-child(2) { animation-delay: .15s; }
  .typing-dots span:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce { to { transform: translateY(-6px); opacity: .4; } }

  /* --- Input bar --- */
  .input-bar {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    gap: 10px;
    align-items: flex-end;
    position: sticky;
    bottom: 0;
    z-index: 10;
    padding-bottom: calc(16px + env(safe-area-inset-bottom));
  }
  .input-bar textarea {
    flex: 1;
    resize: none;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    font-size: 14.5px;
    font-family: inherit;
    line-height: 1.5;
    outline: none;
    min-height: 48px;
    max-height: 150px;
    transition: border-color .15s;
  }
  .input-bar textarea:focus { border-color: var(--primary); }
  .input-bar textarea::placeholder { color: #9ca3af; }

  .send-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: none;
    background: var(--primary);
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s;
    flex-shrink: 0;
  }
  .send-btn:hover { background: var(--primary-h); }
  .send-btn:disabled { opacity: .45; cursor: not-allowed; }

  /* Scrollbar */
  .chat-area::-webkit-scrollbar { width: 6px; }
  .chat-area::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }

  @media (max-width: 880px) {
    .app {
      max-width: 100%;
      border-left: none;
      border-right: none;
    }

    .header,
    .chat-area,
    .input-bar {
      padding-left: 14px;
      padding-right: 14px;
    }

    .msg-bubble {
      max-width: 86%;
    }
  }

  @media (max-width: 560px) {
    .header h1 {
      font-size: 16px;
    }

    .welcome h2 {
      font-size: 20px;
    }

    .msg-bubble {
      max-width: 92%;
      font-size: 14px;
    }

    .input-bar {
      gap: 8px;
      padding-top: 12px;
    }

    .send-btn {
      width: 42px;
      height: 42px;
      font-size: 17px;
    }
  }
</style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <div class="header">
    <h1><span class="icon">📚</span> SmartTutor</h1>
    <button class="clear-btn" onclick="clearChat()">New Chat</button>
  </div>

  <!-- Chat area -->
  <div class="chat-area" id="chatArea">
    <!-- Welcome screen (shown when no messages) -->
    <div class="welcome" id="welcomeScreen">
      <div class="welcome-icon">🎓</div>
      <h2>CSIT5900 SmartTutor</h2>
      <p>Your homework tutoring assistant for math, history, and more. Try a preset question or type your own below.</p>
      <div class="demo-grid" id="demoGrid"></div>
    </div>
  </div>

  <!-- Input bar -->
  <div class="input-bar">
    <textarea id="userInput" rows="1" placeholder="Ask a homework question…"
              onkeydown="handleKey(event)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">
      &#10148;
    </button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
<script>
// ---------- State ----------
let isLoading = false;
const ENABLE_BOT_MARKDOWN_LATEX = __ENABLE_BOT_MARKDOWN_LATEX__;

// ---------- DOM refs ----------
const chatArea      = document.getElementById('chatArea');
const welcomeScreen = document.getElementById('welcomeScreen');
const demoGrid      = document.getElementById('demoGrid');
const userInput     = document.getElementById('userInput');
const sendBtn       = document.getElementById('sendBtn');

marked.setOptions({
  gfm: true,
  breaks: true,
});

function protectMathSegments(rawText) {
  const segments = [];
  const token = idx => `@@MATH_SEGMENT_${idx}@@`;
  let text = rawText || '';

  const patterns = [
    /\$\$[\s\S]+?\$\$/g,
    /\\\[[\s\S]+?\\\]/g,
    /\\\([\s\S]+?\\\)/g,
    /(^|[^\\])\$([^\n$]|\\\$)+\$/g,
  ];

  patterns.forEach((pattern, index) => {
    if (index === 3) {
      text = text.replace(pattern, (match, prefix) => {
        const math = match.slice(prefix.length);
        const key = token(segments.length);
        segments.push(math);
        return `${prefix}${key}`;
      });
      return;
    }

    text = text.replace(pattern, match => {
      const key = token(segments.length);
      segments.push(match);
      return key;
    });
  });

  return { text, segments, token };
}

function renderMath(container, retries = 10) {
  if (!container) return;
  if (typeof renderMathInElement === 'function') {
    renderMathInElement(container, {
      throwOnError: false,
      strict: 'ignore',
      delimiters: [
        { left: '$$', right: '$$', display: true },
        { left: '$', right: '$', display: false },
        { left: '\\(', right: '\\)', display: false },
        { left: '\\[', right: '\\]', display: true },
      ],
    });
    return;
  }
  if (retries > 0) {
    setTimeout(() => renderMath(container, retries - 1), 50);
  }
}

function renderMarkdownAndMath(rawText, container) {
  if (!container) return;
  const protectedMath = protectMathSegments(rawText || '');
  let html = marked.parse(protectedMath.text);

  protectedMath.segments.forEach((segment, index) => {
    html = html.split(protectedMath.token(index)).join(segment);
  });

  container.innerHTML = html;
  renderMath(container);
}

// ---------- Auto-resize textarea ----------
userInput.addEventListener('input', () => {
  userInput.style.height = 'auto';
  userInput.style.height = Math.min(userInput.scrollHeight, 150) + 'px';
});

// ---------- Load demo buttons ----------
fetch('/api/demos')
  .then(r => r.json())
  .then(demos => {
    demos.forEach(d => {
      const btn = document.createElement('button');
      btn.className = 'demo-btn' + (d.key.includes('reject') ? ' reject' : '');
      btn.textContent = d.prompt;
      btn.title = d.prompt;
      btn.onclick = () => sendMessage(d.prompt);
      demoGrid.appendChild(btn);
    });
  });

// ---------- Send message (streaming) ----------
async function sendMessage(text) {
  if (isLoading) return;
  const msg = (text || userInput.value).trim();
  if (!msg) return;

  // Hide welcome screen on first message
  welcomeScreen.style.display = 'none';

  // Show user bubble
  appendMessage('user', msg);
  userInput.value = '';
  userInput.style.height = 'auto';
  setLoading(true);

  // Create empty streaming bot bubble (typing indicator shown initially)
  const bubble = appendStreamingBubble();
  let firstToken = true;
  let botRawText = '';

  try {
    const res = await fetch('/api/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg }),
    });

    if (!res.ok || !res.body) {
      bubble.innerHTML = '<em>[Error] Could not reach the server.</em>';
      setLoading(false);
      return;
    }

    const reader  = res.body.getReader();
    const decoder = new TextDecoder();
    let   buffer  = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });

      // Parse SSE lines: each event is "data: ...\n\n"
      const events = buffer.split('\n\n');
      buffer = events.pop(); // keep incomplete trailing chunk

      for (const event of events) {
        const line = event.trim();
        if (!line.startsWith('data:')) continue;
        const raw = line.slice(5).trim();
        if (raw === '[DONE]') break;
        try {
          const { token } = JSON.parse(raw);
          botRawText += token;
          if (ENABLE_BOT_MARKDOWN_LATEX) {
            // Replace typing indicator with first real content
            renderMarkdownAndMath(botRawText, bubble);
          } else {
            bubble.textContent = botRawText;
          }
          firstToken = false;
          chatArea.scrollTop = chatArea.scrollHeight;
        } catch (_) { /* ignore malformed chunks */ }
      }
    }
    // If we never got a token (empty reply) clear the dots
    if (firstToken) bubble.textContent = '';
  } catch (err) {
    bubble.innerHTML = '<em>[Error] Request failed.</em>';
  }

  setLoading(false);
}

// ---------- Append a user message bubble ----------
function appendMessage(role, text) {
  const row = document.createElement('div');
  row.className = 'msg-row ' + role;

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'user' ? '👤' : '🤖';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  if (role === 'bot' && ENABLE_BOT_MARKDOWN_LATEX) {
    renderMarkdownAndMath(text, bubble);
  } else {
    bubble.textContent = text;
  }

  if (role === 'user') {
    row.appendChild(bubble);
    row.appendChild(avatar);
  } else {
    row.appendChild(avatar);
    row.appendChild(bubble);
  }
  chatArea.appendChild(row);
  chatArea.scrollTop = chatArea.scrollHeight;
}

// ---------- Create an empty streaming bot bubble ----------
// Returns the bubble <div> DOM element directly.
// Shows typing dots until sendMessage() writes the first real token.
function appendStreamingBubble() {
  const row = document.createElement('div');
  row.className = 'msg-row bot';

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = '🤖';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';

  row.appendChild(avatar);
  row.appendChild(bubble);
  chatArea.appendChild(row);
  chatArea.scrollTop = chatArea.scrollHeight;
  return bubble;
}

// ---------- Loading state ----------
function setLoading(v) {
  isLoading = v;
  sendBtn.disabled = v;
}

// ---------- Keyboard shortcut ----------
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

// ---------- Clear chat ----------
async function clearChat() {
  await fetch('/api/clear', { method: 'POST' });
  chatArea.querySelectorAll('.msg-row').forEach(el => el.remove());
  welcomeScreen.style.display = '';
}
</script>
</body>
</html>
